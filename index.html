<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Quartz Gold Miner Pro</title>  
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>  
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>  
    <style>  
        :root { --gold: #f59e0b; --bg-dark: #0f172a; }  
        body { margin: 0; background-color: var(--bg-dark); color: white; font-family: sans-serif; text-align: center; user-select: none; overflow: hidden; }  
          
        .section { display: none; padding: 20px; height: 100vh; box-sizing: border-box; }  
        .active { display: block; }  
  
        .score-box { font-size: 45px; font-weight: bold; margin-top: 10px; color: var(--gold); text-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }  
        .energy-bar { color: #94a3b8; font-size: 16px; margin-bottom: 20px; }  
  
        .main-miner { height: 60vh; display: flex; align-items: center; justify-content: center; }  
        .gold-trigger { width: 250px; cursor: pointer; transition: transform 0.1s; -webkit-tap-highlight-color: transparent; filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.3)); }  
        .gold-trigger:active { transform: scale(0.92); }  
  
        /* Rank & Ref Styles */  
        .rank-list { text-align: left; background: #1e293b; border-radius: 15px; padding: 15px; margin-top: 20px; max-height: 300px; overflow-y: auto; }  
        .rank-item { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #334155; }  
        .ref-card { background: #1e293b; padding: 20px; border-radius: 15px; margin-top: 20px; border: 1px dashed var(--gold); }  
  
        .footer-nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #1e293b; padding: 15px 0; border-top: 1px solid #334155; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); }  
        .nav-item { flex: 1; font-size: 12px; color: #94a3b8; cursor: pointer; transition: 0.3s; }  
        .nav-item.active-nav { color: var(--gold); font-weight: bold; transform: translateY(-3px); }  
  
        .btn { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-top: 15px; }  
    </style>  
</head>  
<body>  
  
    <audio id="bg-music" loop>  
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">  
    </audio>  
    <audio id="click-sound">  
        <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3" type="audio/mpeg">  
    </audio>  
  
    <div id="mine-sec" class="section active">  
        <div style="padding-top: 20px;">⛏️ Miner: <span id="display-id">...</span></div>  
        <div class="score-box">🪙 <span id="gold-count">0</span></div>  
        <div class="energy-bar">⚡ Energy: <span id="energy-count">1000</span>/1000</div>  
          
        <div class="main-miner">  
            <img src="https://img.freepik.com/premium-vector/gold-ore-gem-stone-precious-rock-isolated-white-background_633472-139.jpg" class="gold-trigger" id="mine-btn">  
        </div>  
    </div>  
  
    <div id="rank-sec" class="section">  
        <h2 style="color: var(--gold);">🏆 Global Ranking</h2>  
        <div class="rank-list" id="leaderboard-list">Loading miners...</div>  
    </div>  
  
    <div id="ref-sec" class="section">  
        <h2 style="color: var(--gold);">👥 Referral System</h2>  
        <div class="ref-card">  
            <p>Invite friends and earn <b>2,000 Gold</b> bonus!</p>  
            <div style="font-size: 11px; background: #0f172a; padding: 10px; border-radius: 5px; color: #94a3b8;" id="ref-link">...</div>  
            <button class="btn" onclick="shareRef()">📤 Invite Friend</button>  
        </div>  
    </div>  
  
    <div class="footer-nav">  
        <div class="nav-item active-nav" onclick="showSec('mine-sec', this)">⛏️<br>Mine</div>  
        <div class="nav-item" onclick="showSec('rank-sec', this); loadLeaderboard()">📊<br>Rank</div>  
        <div class="nav-item" onclick="showSec('ref-sec', this)">👥<br>Invite</div>  
    </div>  
  
    <script>  
        // Firebase Configuration (ቀጥታ ካንተ ፕሮጀክት ጋር የተያያዘ)  
        const firebaseConfig = {  
            authDomain: "azizminer1-star-game.firebaseapp.com",  
            projectId: "azizminer1-star-game",  
            storageBucket: "azizminer1-star-game.appspot.com",  
            messagingSenderId: "1056584257540",  
            appId: "1:1056584257540:web:d797587823f66c0d061732"  
        };  
        firebase.initializeApp(firebaseConfig);  
        const db = firebase.firestore();  
  
        // User Data  
        let userId = localStorage.getItem('miner_id') || "AZ_" + Math.floor(Math.random() * 89999 + 10000);  
        localStorage.setItem('miner_id', userId);  
        let gold = parseInt(localStorage.getItem('gold_bal')) || 0;  
        let energy = 1000;  
  
        document.getElementById('display-id').innerText = userId;  
        document.getElementById('gold-count').innerText = gold;  
        document.getElementById('ref-link').innerText = "https://t.me/your_bot_name?start=" + userId;  
  
        // Autoplay Fix (መጀመሪያ ሲነካ ሙዚቃ ይጀምራል)  
        window.addEventListener('click', () => {  
            const music = document.getElementById('bg-music');  
            if (music.paused) {   
                music.play();   
                music.volume = 0.2;   
            }  
        }, { once: true });  
  
        // Mining Logic  
        const mineBtn = document.getElementById('mine-btn');  
        mineBtn.addEventListener('click', (e) => {  
            if (energy > 0) {  
                gold++;  
                energy--;  
                updateUI();  
                playClick();  
                saveToFirebase();  
            }  
        });  
  
        function updateUI() {  
            document.getElementById('gold-count').innerText = gold;  
            document.getElementById('energy-count').innerText = energy;  
            localStorage.setItem('gold_bal', gold);  
        }  
  
        function playClick() {  
            const snd = document.getElementById('click-sound');  
            snd.currentTime = 0;  
            snd.play();  
        }  
  
        function saveToFirebase() {  
            db.collection("users").doc(userId).set({  
                score: gold,  
                energy: energy,  
                name: userId,  
                lastSeen: firebase.firestore.FieldValue.serverTimestamp()  
            }, { merge: true });  
        }  
  
        // Leaderboard  
        function loadLeaderboard() {  
            const list = document.getElementById('leaderboard-list');  
            list.innerHTML = "Loading...";  
            db.collection("users").orderBy("score", "desc").limit(10).get().then(snap => {  
                list.innerHTML = "";  
                snap.forEach((doc, i) => {  
                    const data = doc.data();  
                    list.innerHTML += `  
                        <div class="rank-item">  
                            <span><b>#${i+1}</b> ${data.name}</span>  
                            <span style="color:var(--gold)">🪙 ${data.score}</span>  
                        </div>`;  
                });  
            });  
        }  
  
        function showSec(id, el) {  
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));  
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));  
            document.getElementById(id).classList.add('active');  
            el.classList.add('active-nav');  
        }  
  
        function shareRef() {  
            const link = document.getElementById('ref-link').innerText;  
            window.open(`https://t.me/share/url?url=${link}&text=Join my mining team on Quartz Gold!`);  
        }  
  
        // Energy Recovery (በየ 3 ሰከንዱ 1 ኢነርጂ ይጨምራል)  
        setInterval(() => {  
            if (energy < 1000) { energy++; updateUI(); }  
        }, 3000);  
    </script>  
</body>  
  </html>

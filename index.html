<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Quartz Gold Miner - Final Pro</title>  
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>  
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>  
    <style>  
        :root { --gold: #f59e0b; --bg: #0f172a; --card: #1e293b; }  
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; text-align: center; user-select: none; }  
        .section { display: none; padding: 20px; padding-bottom: 100px; min-height: 100vh; box-sizing: border-box; }  
        .active { display: block; }  
        .score-box { font-size: 50px; font-weight: bold; margin: 15px 0; color: var(--gold); text-shadow: 0 0 10px rgba(245,158,11,0.5); }  
        .energy-txt { color: #94a3b8; font-size: 16px; margin-bottom: 20px; }  
        .gold-trigger { width: 250px; cursor: pointer; transition: transform 0.1s; -webkit-tap-highlight-color: transparent; }  
        .gold-trigger:active { transform: scale(0.94); }  
        .card { background: var(--card); border-radius: 15px; padding: 20px; margin-top: 20px; border: 1px solid #334155; }  
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }  
        .btn { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }  
        .footer-nav { position: fixed; bottom: 0; width: 100%; display: flex; background: var(--card); padding: 15px 0; border-top: 1px solid #334155; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); }  
        .nav-item { flex: 1; font-size: 12px; color: #94a3b8; cursor: pointer; }  
        .nav-item.active-nav { color: var(--gold); font-weight: bold; }  
    </style>  
</head>  
<body>  
  
    <audio id="bg-music" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>  
    <audio id="click-sound"><source src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>  
  
    <div id="mine-sec" class="section active">  
        <div style="padding-top:10px; font-size:12px; color:#64748b;">ID: <span id="user-id-display">...</span></div>  
        <div class="score-box">🪙 <span id="gold-count">0</span></div>  
        <div class="energy-txt">⚡ Energy: <span id="energy-count">1000</span>/1000</div>  
        <div style="height: 50vh; display: flex; align-items: center; justify-content: center;">  
            <img src="https://img.freepik.com/premium-vector/gold-ore-gem-stone-precious-rock-isolated-white-background_633472-139.jpg" class="gold-trigger" id="mine-btn">  
        </div>  
    </div>  
  
    <div id="rank-sec" class="section">  
        <h2 style="color: var(--gold);">🏆 Leaderboard</h2>  
        <div id="leaderboard-list" class="card" style="text-align: left;">Loading...</div>  
    </div>  
  
    <div id="wallet-sec" class="section">  
        <h2>💰 Withdraw Crypto</h2>  
        <div class="card">  
            <p>Balance: <span id="w-balance" style="color: var(--gold); font-weight: bold;">0</span> Coins</p>  
            <input type="text" id="wallet-addr" placeholder="Enter TON/USDT Address">  
            <button class="btn" onclick="requestWithdraw()">Withdraw to Wallet</button>  
            <p style="font-size: 10px; color: #94a3b8; margin-top: 10px;">Min: 100,000 | Process time: 24h</p>  
        </div>  
    </div>  
  
    <div id="ref-sec" class="section">  
        <h2>👥 Invite Friends</h2>  
        <div class="card">  
            <p style="font-size: 13px;">Copy and share your link to get 5,000 bonus!</p>  
            <div id="ref-link" style="font-size: 10px; background: #0f172a; padding: 10px; border-radius: 5px; margin: 10px 0; word-break: break-all;">...</div>  
            <button class="btn" onclick="shareRef()">Share on Telegram</button>  
        </div>  
    </div>  
  
    <div class="footer-nav">  
        <div class="nav-item active-nav" onclick="showSec('mine-sec', this)">⛏️<br>Mine</div>  
        <div class="nav-item" onclick="showSec('rank-sec', this); loadLeaderboard()">📊<br>Rank</div>  
        <div class="nav-item" onclick="showSec('wallet-sec', this); updateWalletUI()">💰<br>Wallet</div>  
        <div class="nav-item" onclick="showSec('ref-sec', this)">👥<br>Invite</div>  
    </div>  
  
    <script>  
        // --- ያንተ ትክክለኛ Firebase Config እዚህ ገብቷል ---  
        const firebaseConfig = {  
            apiKey: "AIzaSyDttFlyuy5b2YJPWO5uXMKHsc1FeUUjoeI",  
            authDomain: "azizminer1-star-game.firebaseapp.com",  
            projectId: "azizminer1-star-game",  
            storageBucket: "azizminer1-star-game.firebasestorage.app",  
            messagingSenderId: "161135020264",  
            appId: "1:161135020264:web:38b4a9a88184890641615d",  
            measurementId: "G-7TV5BE8VTJ"  
        };  
        firebase.initializeApp(firebaseConfig);  
        const db = firebase.firestore();  
  
        // Game State  
        let uid = localStorage.getItem('miner_uid') || "AZ_" + Math.floor(Math.random() * 89999 + 10000);  
        localStorage.setItem('miner_uid', uid);  
        let gold = parseInt(localStorage.getItem('gold_bal')) || 0;  
        let energy = 1000;  
  
        document.getElementById('user-id-display').innerText = uid;  
        document.getElementById('gold-count').innerText = gold;  
        document.getElementById('ref-link').innerText = "https://t.me/AzizGoldMiner_bot?start=" + uid;  
  
        // Music & Mine Logic  
        window.addEventListener('click', () => {   
            const m = document.getElementById('bg-music'); if(m.paused){m.play(); m.volume=0.2;}   
        }, {once: true});  
  
        document.getElementById('mine-btn').addEventListener('click', () => {  
            if (energy > 0) {  
                gold++; energy--;  
                updateUI();  
                const snd = document.getElementById('click-sound'); snd.currentTime=0; snd.play();  
                saveToDB();  
            }  
        });  
  
        function updateUI() {  
            document.getElementById('gold-count').innerText = gold;  
            document.getElementById('energy-count').innerText = energy;  
            localStorage.setItem('gold_bal', gold);  
        }  
  
        function saveToDB() {  
            db.collection("users").doc(uid).set({ score: gold, lastSeen: new Date() }, { merge: true });  
        }  
  
        function updateWalletUI() { document.getElementById('w-balance').innerText = gold.toLocaleString(); }  
  
        function requestWithdraw() {  
            const addr = document.getElementById('wallet-addr').value;  
            if(gold < 100000) { alert("Minimum 100,000 coins!"); return; }  
            if(addr.length < 10) { alert("Invalid Address!"); return; }  
            db.collection("withdraws").add({ uid, amount: gold, address: addr, status: "pending", date: new Date() })  
            .then(() => alert("Request sent successfully!"));  
        }  
  
        function loadLeaderboard() {  
            const list = document.getElementById('leaderboard-list');  
            list.innerHTML = "Loading...";  
            db.collection("users").orderBy("score", "desc").limit(10).get().then(snap => {  
                list.innerHTML = "";  
                snap.forEach((doc, i) => {  
                    const d = doc.data();  
                    list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #334155;">  
                        <span>${i+1}. ${doc.id}</span> <b>🪙 ${d.score}</b>  
                    </div>`;  
                });  
            });  
        }  
  
        function showSec(id, el) {  
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));  
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));  
            document.getElementById(id).classList.add('active');  
            el.classList.add('active-nav');  
        }  
  
        function shareRef() {  
            const link = document.getElementById('ref-link').innerText;  
            window.open(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Join my mining team!`);  
        }  
          
        // Auto Energy recovery  
        setInterval(() => { if(energy < 1000) { energy++; updateUI(); } }, 3000);  
    </script>  
</body>  
              </html>

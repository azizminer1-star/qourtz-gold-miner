<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Quartz Gold Miner</title>  
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>  
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>  
    <style>  
        :root { --gold: #f59e0b; --bg-dark: #0f172a; }  
        body { margin: 0; background-color: var(--bg-dark); color: white; font-family: sans-serif; text-align: center; user-select: none; }  
        .header { padding: 20px; font-size: 20px; color: var(--gold); font-weight: bold; }  
        .score-box { font-size: 50px; font-weight: bold; margin: 10px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }  
        .energy { color: #94a3b8; font-size: 16px; margin-bottom: 20px; }  
        .main-content { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; }  
          
        .gold-trigger {  
            width: 260px;  
            cursor: pointer;  
            transition: transform 0.1s;  
            -webkit-tap-highlight-color: transparent;  
        }  
        .gold-trigger:active { transform: scale(0.92); }  
  
        .btn-bonus {  
            background: var(--gold);  
            color: black;  
            border: none;  
            padding: 15px 40px;  
            border-radius: 12px;  
            font-weight: bold;  
            font-size: 18px;  
            margin-top: 30px;  
            cursor: pointer;  
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);  
        }  
          
        .footer-nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #1e293b; padding: 12px 0; border-top: 1px solid #334155; }  
        .nav-item { flex: 1; font-size: 12px; color: #94a3b8; cursor: pointer; }  
        .nav-item.active { color: var(--gold); }  
    </style>  
</head>  
<body>  
  
    <div class="header">⛏️ Quartz Gold Miner</div>  
      
    <div class="score-box">  
        <img src="https://cdn-icons-png.flaticon.com/512/2415/2415307.png" width="45">  
        <span id="gold-count">0</span>  
    </div>  
      
    <div class="energy">⚡ Energy: <span id="energy-count">1000</span>/1000</div>  
  
    <div class="main-content">  
        <img src="https://cdn-icons-png.flaticon.com/512/2415/2415307.png" class="gold-trigger" id="mine-button" alt="Gold">  
        <button class="btn-bonus" id="bonus-btn">🎁 Daily Bonus (+500)</button>  
    </div>  
  
    <div class="footer-nav">  
        <div class="nav-item active">⛏️<br>Mine</div>  
        <div class="nav-item">⭐<br>Stars</div>  
        <div class="nav-item">👥<br>Invite</div>  
        <div class="nav-item">📊<br>Top</div>  
        <div class="nav-item">⚙️<br>Owner</div>  
    </div>  
  
    <script>  
        // የአንተ Firebase Config እዚህ ጋር ገብቷል  
        const firebaseConfig = {  
            apiKey: "AIzaSyD-ያንተን-API-KEY-እዚህ-ተካ",   
            authDomain: "azizminer1-star-game.firebaseapp.com",  
            projectId: "azizminer1-star-game",  
            storageBucket: "azizminer1-star-game.appspot.com",  
            messagingSenderId: "1056584257540",  
            appId: "1:1056584257540:web:ያንተን-APP-ID-ተካ"  
        };  
  
        firebase.initializeApp(firebaseConfig);  
        const db = firebase.firestore();  
  
        let gold = localStorage.getItem('gold') ? parseInt(localStorage.getItem('gold')) : 0;  
        let energy = 1000;  
        const userId = "user_aziz_" + Math.floor(Math.random() * 9999);  
  
        const goldDisplay = document.getElementById('gold-count');  
        const energyDisplay = document.getElementById('energy-count');  
        const mineBtn = document.getElementById('mine-button');  
        const bonusBtn = document.getElementById('bonus-btn');  
  
        // መረጃን መጀመሪያ አሳይ  
        goldDisplay.innerText = gold;  
  
        mineBtn.addEventListener('click', () => {  
            if (energy > 0) {  
                gold++;  
                energy--;  
                updateDisplay();  
                saveToFirebase();  
            }  
        });  
  
        bonusBtn.addEventListener('click', () => {  
            gold += 500;  
            updateDisplay();  
            saveToFirebase();  
            bonusBtn.disabled = true;  
            bonusBtn.innerText = "✅ Claimed";  
        });  
  
        function updateDisplay() {  
            goldDisplay.innerText = gold;  
            energyDisplay.innerText = energy;  
            localStorage.setItem('gold', gold);  
        }  
  
        function saveToFirebase() {  
            db.collection("users").doc(userId).set({  
                gold: gold,  
                energy: energy,  
                lastSeen: firebase.firestore.FieldValue.serverTimestamp()  
            }, { merge: true });  
        }  
    </script>  
</body>  
</html>
